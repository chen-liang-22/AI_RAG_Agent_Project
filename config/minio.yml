# MinIO 文件存储配置。

# 是否启用 MinIO 客户端。
# 枚举：
# - true：启用公共文件存储工具。
# - false：禁用后会在调用时给出明确错误。
enabled: true

# MinIO 服务地址。
# Docker 本地默认就是 127.0.0.1:9000。
endpoint: 127.0.0.1:9000

# 访问密钥。
# 默认对应你 docker run 里设置的 MINIO_ROOT_USER。
access_key: admin

# 密钥环境变量名。
# 默认从 MINIO_ROOT_PASSWORD 读取。
secret_key_env: MINIO_ROOT_PASSWORD

# 访问密钥密码的兜底值。
# 如果环境变量没有配置，会使用这里的值。
secret_key: 1234qwer

# 是否使用 HTTPS。
# 本地 Docker 一般用 false。
secure: false

# 默认桶名。
# 你当前建的是公共桶 pub。
bucket_name: pub

# 公共访问前缀。
# 如果留空，后端会自动按 endpoint 拼接。
public_base_url: http://127.0.0.1:9000

# 是否在桶不存在时自动创建。
# 公共桶通常建议手动创建后再用。
auto_create_bucket: false

