# 业务元数据库配置。
# 当前运行时统一使用 MySQL；单元测试如需本地兼容库，会在系统临时目录中显式指定。
type: mysql

mysql:
  # MySQL 主机地址。
  host: "127.0.0.1"
  # MySQL 端口。
  port: 3306
  # 数据库名，对应 docs/mysql初始化建表和基础数据.sql 中创建的库。
  database: "ai_rag_agent"
  # MySQL 用户名。
  user: "root"
  # 密码优先从环境变量 MYSQL_PASSWORD 读取；没有环境变量时使用 password。
  password_env: "MYSQL_PASSWORD"
  password: "1234qwer"
  # 字符集固定 utf8mb4，支持中文和 emoji。
  charset: "utf8mb4"
