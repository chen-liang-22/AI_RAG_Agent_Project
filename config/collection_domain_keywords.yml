# Collection 领域关键词种子配置。
#
# 作用：
# - 启动时同步到 dictionary_items 字典表的 collection_domain_keyword 字典。
# - RAG adaptive 极低分跳过 Query Planner 时，会按当前 collection_name 读取这些领域词。
# - 换知识领域时，可以在这里新增 collection 分组，或通过 /dictionaries/items 接口维护。

collections:
  agent:
    - app
    - 扫地
