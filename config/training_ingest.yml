# 销售训练资料入库配置。

# 销售训练向量库配置。
# published：正式训练资料向量库，只有人工发布成功的数据参与训练检索。
# staging：临时待审核向量库，上传和重新切分后的切片先写这里，发布成功后会清理对应 batch_id。
collections:
  published: "sales_training_cases"
  staging: "sales_training_cases_staging"

# LMS 场景案例资料切分配置。
lms_case:
  # 中文编号标题识别规则。
  # 作用：用于识别“一、客户案例”“二. 客户案例”这类一级案例标题。
  case_title_pattern: "^[一二三四五六七八九十]+[、.．]\\s*.+"

  # 业务片段关键词配置。
  # 作用：把案例正文分到统一的 case_part，后续检索、角色生成和评分都按 case_part 使用。
  part_markers:
    # case_profile：客户背景、企业信息、合作阶段等基础资料。
    case_profile:
      - "客户案例"
      - "企业"
      - "老板身份"
      - "合作行业"
      - "客户阶段"
    # task_requirement：本案例要求学员完成的训练目标或沟通任务。
    task_requirement:
      - "任务要求"
    # standard_answer：参考话术、标准答案、优秀表达。
    standard_answer:
      - "匹配答案"
      - "话术案例"
      - "话术原文"
      - "谈单话术"
      - "参考答案"
    # hidden_psychology：客户真实顾虑、隐性痛点，只给 AI 客户使用。
    hidden_psychology:
      - "隐性心理"
      - "底层顾虑"
      - "底层需求"
      - "客户底层心理"
      - "核心显性卡点"
      - "隐性痛点"
    # scoring_rubric：命中点、扣分点、评分标准，只给评分环节使用。
    scoring_rubric:
      - "命中点"
      - "扣分点"
      - "评分标准"
      - "能力维度"

  # 不同 case_part 的默认可见性。
  # visible：角色生成、对话和评分都可以使用。
  # hidden：用于 AI 客户扮演，不直接展示为学员可见资料。
  # scoring_only：只用于训练结束评分。
  part_visibility:
    case_profile: "visible"
    task_requirement: "visible"
    standard_answer: "visible"
    hidden_psychology: "hidden"
    scoring_rubric: "scoring_only"

# 切片质量评估配置。
quality:
  # 自动通过阈值。达到该分数说明规则切分质量较好。
  pass_score: 80
  # 人工复核阈值。低于该分数说明结构风险较高，必须重点检查。
  review_score: 60
  # 单个切片建议最大字符数。超过后会扣分并提示风险。
  max_chunk_chars: 1800
  # 单一片段内容占比上限。超过说明内容可能过度集中在一个片段。
  max_single_part_ratio: 0.75
  # LMS 案例建议至少覆盖的核心片段。
  required_parts:
    - "case_profile"
    - "task_requirement"
    - "standard_answer"
  # 有助于后续评分的推荐片段，缺失时只轻微扣分。
  recommended_parts:
    - "scoring_rubric"

# LLM 兜底切分配置。
# 作用：规则切分质量低时，才调用模型重新抽取结构化切片，避免每次上传都消耗模型。
llm_fallback:
  # 是否启用低质量兜底切分。
  # false 表示只使用规则/配置切分和质量评估。
  enabled: true
  # 触发兜底的质量分阈值。
  # 当规则切分分数低于该值时，会尝试调用 LLM 重新切分。
  trigger_score_below: 60
  # 调用模型时使用的模型档位。
  # 留空表示使用 config/rag.yml 中的默认聊天模型。
  model_mode: null
  # 送入模型的原文最大字符数。
  # 太长会增加耗时和费用，建议先控制在 8000-15000。
  max_source_chars: 12000
  # LLM 最多返回多少个案例。
  max_cases: 20
  # LLM 最多返回多少个切片，超过后会被截断。
  max_chunks: 80

# 发布后抽样检索验证配置。
# 作用：确认写入 Qdrant 后，抽几条切片回查，验证 batch_id 过滤和向量召回是否基本可用。
publish_validation:
  # 是否在发布完成后做抽样检索验证。
  enabled: true
  # 每个批次最多抽样多少个切片。
  sample_size: 3
  # 每条样本检索时召回多少条结果。
  search_k: 3
  # 通过样本占比阈值。
  # 例如 0.6 表示至少 60% 的样本能在检索结果里命中本批次。
  min_hit_ratio: 0.6
