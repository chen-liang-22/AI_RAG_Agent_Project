services:
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  api:
    build: .
    depends_on:
      - qdrant
    ports:
      - "8000:8000"
    environment:
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION_NAME: agent

volumes:
  qdrant_storage:
