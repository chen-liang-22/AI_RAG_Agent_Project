services:
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  api:
    # Local development builds from this backend project.
    # For deployment, replace build with:
    # image: chen923705168/ai-rag-agent-api:1.0
    build: .
    depends_on:
      - qdrant
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION_NAME: agent

  frontend:
    build:
      context: ../AI_RAG_Agent_Frontend
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  qdrant_storage:
